<!DOCTYPE html>
<html lang="fr">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Commandez un chauffeur en quelques secondes. Misy, l'application de transport à Madagascar — taxi, moto, van, et transport en commun d'Antananarivo.">

  <!-- Open Graph — aperçus de partage WhatsApp/Facebook (audit SEO 05/06) -->
  <meta property="og:title" content="Misy — Réserver une course">
  <meta property="og:description" content="Commandez un chauffeur en quelques secondes à Madagascar. Prix annoncé avant la course, paiement mobile money ou espèces.">
  <meta property="og:image" content="https://book.misy.app/icons/Icon-512.png">
  <meta property="og:url" content="https://book.misy.app/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Misy">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Misy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Misy — Réserver une course</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JavaScript API (Places pour l'autocomplete uniquement —
       le fond de carte est OSM auto-hébergé). `defer` : ne bloque plus le
       premier rendu du splash ni le téléchargement de main.dart.js. -->
  <script defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBbcjTBakwdPpLeuQvb_5Fk6jY9oqXwOko&libraries=places"></script>

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;

    // Custom map style - applied via JS for web compatibility
    // Fond gris clair, routes gris bitume (foncé→clair), eau bleue, POIs masqués
    window.misyMapStyle = [
      {"elementType":"geometry","stylers":[{"color":"#E5E9EC"}]},
      {"featureType":"road.highway","elementType":"geometry","stylers":[{"color":"#A6B5DE"}]},
      {"featureType":"road.highway","elementType":"labels.text.stroke","stylers":[{"color":"#FFFFFF"},{"weight":3}]},
      {"featureType":"road.highway","elementType":"labels.text.fill","stylers":[{"color":"#7A7A7A"}]},
      {"featureType":"road.arterial","elementType":"geometry","stylers":[{"color":"#BCC5E8"}]},
      {"featureType":"road.arterial","elementType":"labels.text.fill","stylers":[{"color":"#7A7A7A"}]},
      {"featureType":"road.arterial","elementType":"labels.text.stroke","stylers":[{"color":"#FFFFFF"},{"weight":2}]},
      {"featureType":"road.local","elementType":"geometry","stylers":[{"color":"#FFFFFF"}]},
      {"featureType":"road.local","elementType":"labels.text.fill","stylers":[{"color":"#7A7A7A"}]},
      {"featureType":"road.local","elementType":"labels.text.stroke","stylers":[{"color":"#FFFFFF"},{"weight":2}]},
      {"featureType":"road","elementType":"labels","stylers":[{"visibility":"on"}]},
      {"featureType":"road.highway","elementType":"labels.icon","stylers":[{"visibility":"on"}]},
      {"featureType":"water","elementType":"geometry","stylers":[{"color":"#ADD4F5"}]},
      {"featureType":"poi","stylers":[{"visibility":"off"}]},
      {"featureType":"transit","elementType":"geometry","stylers":[{"color":"#E5E9EC"}]},
      {"featureType":"transit.station","stylers":[{"visibility":"off"}]}
    ];

    // Apply style to a single map instance
    window.applyStyleToMap = function(map) {
      if (map) {
        map.setOptions({
          styles: window.misyMapStyle,
          clickableIcons: false,
          disableDefaultUI: false,
          zoomControl: true,
          mapTypeControl: false,
          scaleControl: false,
          streetViewControl: false,
          rotateControl: false,
          fullscreenControl: false
        });
      }
    };

    // Find and style all Google Maps instances
    window.applyMisyMapStyle = function() {
      const applyToAllMaps = function() {
        const mapDivs = document.querySelectorAll('[id^="map-"]');
        mapDivs.forEach(function(mapDiv) {
          if (mapDiv.__gm && mapDiv.__gm.map) {
            window.applyStyleToMap(mapDiv.__gm.map);
            console.log('Misy map style applied to', mapDiv.id);
          }
        });
      };

      // Apply multiple times to catch late-initialized maps
      applyToAllMaps();
      setTimeout(applyToAllMaps, 500);
      setTimeout(applyToAllMaps, 1000);
      setTimeout(applyToAllMaps, 2000);
    };
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #FFFFFF;
    }
    /* Hide Flutter's default loading indicator */
    .loading {
      display: none !important;
    }
    /* Boot-loader HTML : visible pendant le téléchargement/démarrage du
       moteur Flutter (sinon écran blanc de plusieurs secondes), retiré au
       premier frame via l'événement `flutter-first-frame`. */
    #misy-boot {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #FFFFFF;
      transition: opacity 0.3s ease;
    }
    /* Wordmark au ratio NATUREL (510×400 avec marge basse) — l'ex
       Icon-192.png était le mark écrasé dans un carré → logo étiré. */
    #misy-boot img {
      width: 116px;
      height: auto;
    }
    #misy-boot .misy-boot-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 83, 87, 0.18);
      border-top-color: #FF5357;
      border-radius: 50%;
      animation: misy-boot-spin 0.9s linear infinite;
    }
    @keyframes misy-boot-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="misy-boot">
    <img src="icons/boot-logo.png" alt="Misy">
    <div class="misy-boot-spinner"></div>
  </div>
  <script>
    // Retire le boot-loader dès que Flutter a peint son premier frame.
    window.addEventListener('flutter-first-frame', function () {
      var boot = document.getElementById('misy-boot');
      if (boot) {
        boot.style.opacity = '0';
        setTimeout(function () { boot.remove(); }, 350);
      }
    });
  </script>
  <script>
    window.addEventListener('load', function(ev) {
      // Force unregister old service workers to clear cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      }
      // Clear caches
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
          }
        });
      }
      // Download main.dart.js without service worker
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
